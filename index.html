<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RWCTC AI — Local Backup</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f0f0f;
      color: #e8e8e8;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 16px 24px;
      border-bottom: 1px solid #222;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #141414;
    }

    header h1 {
      font-size: 18px;
      font-weight: 600;
      color: #fff;
      letter-spacing: -0.3px;
    }

    header span {
      font-size: 12px;
      color: #555;
    }

    #status {
      font-size: 12px;
      padding: 4px 10px;
      border-radius: 20px;
      background: #1a1a1a;
      border: 1px solid #333;
    }

    #status.online  { color: #4ade80; border-color: #166534; }
    #status.offline { color: #f87171; border-color: #7f1d1d; }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .msg {
      max-width: 720px;
      line-height: 1.6;
      font-size: 15px;
    }

    .msg.user {
      align-self: flex-end;
      background: #1e3a5f;
      color: #e0f0ff;
      padding: 12px 16px;
      border-radius: 18px 18px 4px 18px;
    }

    .msg.bot {
      align-self: flex-start;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      padding: 14px 18px;
      border-radius: 4px 18px 18px 18px;
      white-space: pre-wrap;
    }

    .msg.bot.thinking {
      color: #555;
      font-style: italic;
      border-color: #1f1f1f;
    }

    footer {
      padding: 16px 24px;
      border-top: 1px solid #222;
      background: #141414;
      display: flex;
      gap: 10px;
    }

    #input {
      flex: 1;
      background: #1e1e1e;
      border: 1px solid #333;
      border-radius: 12px;
      color: #e8e8e8;
      font-size: 15px;
      padding: 12px 16px;
      resize: none;
      outline: none;
      line-height: 1.5;
      max-height: 140px;
      font-family: inherit;
    }

    #input:focus { border-color: #444; }
    #input::placeholder { color: #444; }

    #send {
      background: #1e3a5f;
      border: none;
      border-radius: 12px;
      color: #60a5fa;
      font-size: 20px;
      width: 48px;
      cursor: pointer;
      transition: background 0.15s;
    }

    #send:hover { background: #1d4ed8; color: #fff; }
    #send:disabled { opacity: 0.3; cursor: not-allowed; }

    .model-tag {
      font-size: 11px;
      color: #444;
      margin-top: 6px;
      padding-left: 4px;
    }

    #model-select {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      color: #888;
      font-size: 12px;
      padding: 4px 8px;
      border-radius: 8px;
      outline: none;
      cursor: pointer;
    }
  </style>
</head>
<body>

<header>
  <h1>🔥 RWCTC Local AI</h1>
  <div style="display:flex;align-items:center;gap:12px;">
    <select id="model-select">
      <option value="llama3.2">llama3.2</option>
      <option value="llama3.2:1b">llama3.2:1b</option>
      <option value="mistral">mistral</option>
    </select>
    <span id="status">checking…</span>
  </div>
</header>

<div id="chat"></div>

<footer>
  <textarea id="input" rows="1" placeholder="Ask anything… (Enter to send, Shift+Enter for new line)"></textarea>
  <button id="send">↑</button>
</footer>

<script>
  const OLLAMA = 'http://localhost:11434';
  const chat   = document.getElementById('chat');
  const input  = document.getElementById('input');
  const sendBtn= document.getElementById('send');
  const status = document.getElementById('status');
  const modelSel = document.getElementById('model-select');

  let history = [];

  // Check if Ollama is alive
  async function checkStatus() {
    try {
      const r = await fetch(`${OLLAMA}/api/tags`, { signal: AbortSignal.timeout(2000) });
      if (r.ok) {
        const data = await r.json();
        status.textContent = '● online';
        status.className = 'online';
        // Populate model list from what's actually installed
        const models = data.models?.map(m => m.name) || [];
        if (models.length) {
          modelSel.innerHTML = models.map(m =>
            `<option value="${m}">${m}</option>`
          ).join('');
        }
      }
    } catch {
      status.textContent = '● offline';
      status.className = 'offline';
    }
  }

  checkStatus();
  setInterval(checkStatus, 10000);

  function appendMsg(role, text) {
    const div = document.createElement('div');
    div.className = `msg ${role}`;
    div.textContent = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    return div;
  }

  async function send() {
    const text = input.value.trim();
    if (!text) return;

    input.value = '';
    input.style.height = 'auto';
    sendBtn.disabled = true;

    appendMsg('user', text);
    history.push({ role: 'user', content: text });

    const thinking = appendMsg('bot thinking', '…');

    try {
      const res = await fetch(`${OLLAMA}/api/chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: modelSel.value,
          messages: history,
          stream: true
        })
      });

      thinking.className = 'msg bot';
      thinking.textContent = '';

      let full = '';
      const reader = res.body.getReader();
      const decoder = new TextDecoder();

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        const lines = decoder.decode(value).split('\n').filter(Boolean);
        for (const line of lines) {
          try {
            const obj = JSON.parse(line);
            if (obj.message?.content) {
              full += obj.message.content;
              thinking.textContent = full;
              chat.scrollTop = chat.scrollHeight;
            }
          } catch {}
        }
      }

      history.push({ role: 'assistant', content: full });

    } catch (err) {
      thinking.className = 'msg bot';
      thinking.textContent = `⚠️ Ollama offline. Run: ollama serve\n\n${err.message}`;
    }

    sendBtn.disabled = false;
    input.focus();
  }

  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      send();
    }
  });

  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = input.scrollHeight + 'px';
  });

  sendBtn.addEventListener('click', send);
</script>
</body>
</html>
